model:
  pretrained_model_name_or_path: "stabilityai/stable-diffusion-3.5-large"

inference:
  num_inference_steps: 40
  guidance_scale: 7.0
  height: 512
  width: 512
  dtype: "bfloat16"
  max_samples: 5
  prompts:
    - "a surgical photograph, krnsurg"
    - "a laparoscopic surgical view, krnsurg"
    - "an intraoperative endoscopic image, krnsurg"
    - "a minimally invasive surgery scene, krnsurg"
    - "a laparoscopic cholecystectomy view, krnsurg"
  pipeline_kwargs:
    negative_prompt: "text, letters, watermark, words, writing, caption, label, subtitle, logo"

output:
  output_dir: /lustre/fsw/portfolios/healthcareeng/projects/healthcareeng_holoscan/users/pkorzeniowsk/automodel/results/sd3_base_inference

distributed: null

vae:
  enable_slicing: false
  enable_tiling: false
  enable_cpu_offload: true

seed: 42
