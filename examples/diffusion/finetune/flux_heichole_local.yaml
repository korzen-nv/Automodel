model:
  pretrained_model_name_or_path: "black-forest-labs/FLUX.1-dev"
  mode: "finetune"
  cache_dir: null
  attention_backend: "native"

optim:
  learning_rate: 5e-6

  optimizer:
    type: flash_adamw
    weight_decay: 0.01
    betas: [0.9, 0.999]

# Single Blackwell RTX 96GB GPU
fsdp:
  dp_size: 1
  tp_size: 1
  cp_size: 1
  pp_size: 1
  activation_checkpointing: true
  cpu_offload: false

flow_matching:
  adapter_type: "flux"
  adapter_kwargs:
    guidance_scale: 1
    use_guidance_embeds: false
  timestep_sampling: "logit_normal"
  logit_mean: 0.0
  logit_std: 1.0
  flow_shift: 1.0
  mix_uniform_ratio: 0.0
  sigma_min: 0.0
  sigma_max: 1.0
  num_train_timesteps: 1000
  i2v_prob: 0.0
  use_loss_weighting: false
  log_interval: 100
  summary_log_interval: 10

step_scheduler:
  num_epochs: 5
  local_batch_size: 1
  global_batch_size: 1
  ckpt_every_steps: 1000
  log_every: 5

data:
  dataloader:
    _target_: nemo_automodel.components.datasets.diffusion.build_text_to_image_multiresolution_dataloader
    cache_dir: /home/pkorzeniowsk/Projects/nemo-automodel/data/heichole_flux_cache
    train_text_encoder: false
    num_workers: 4
    base_resolution: [512, 512]
    dynamic_batch_size: false
    shuffle: true
    drop_last: false

checkpoint:
  enabled: true
  checkpoint_dir: /home/pkorzeniowsk/Projects/nemo-automodel/checkpoints/flux_heichole
  model_save_format: safetensors
  save_consolidated: false
  diffusers_compatible: false
  restore_from: null

wandb:
  project: flux-heichole-surgical
  mode: disabled
  name: flux_heichole_local_test

dist_env:
  backend: "nccl"
  init_method: "env://"

seed: 42
