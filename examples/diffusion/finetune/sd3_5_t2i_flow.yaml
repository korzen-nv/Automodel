model:
  pretrained_model_name_or_path: "stabilityai/stable-diffusion-3.5-large"
  mode: "finetune"
  cache_dir: null
  attention_backend: "flash"

optim:
  learning_rate: 1e-5

  optimizer:
    weight_decay: 0.01
    betas: [0.9, 0.999]

#adjust dp_size to the total number of GPUs
fsdp:
  dp_size: 8
  tp_size: 1
  cp_size: 1
  pp_size: 1
  activation_checkpointing: false
  cpu_offload: false

flow_matching:
  adapter_type: "sd3"
  adapter_kwargs:
    guidance_scale: 7.0
  timestep_sampling: "logit_normal"
  logit_mean: 0.0
  logit_std: 1.0
  flow_shift: 3.0
  mix_uniform_ratio: 0.0
  sigma_min: 0.0
  sigma_max: 1.0
  num_train_timesteps: 1000
  i2v_prob: 0.0
  use_loss_weighting: false
  log_interval: 100
  summary_log_interval: 10

step_scheduler:
  num_epochs: 5000
  local_batch_size: 1
  global_batch_size: 8
  ckpt_every_steps: 500
  log_every: 1

data:
  dataloader:
    _target_: nemo_automodel.components.datasets.diffusion.build_text_to_image_multiresolution_dataloader
    cache_dir: PATH_TO_YOUR_DATA
    train_text_encoder: false
    num_workers: 2
    # SD3.5 supports resolutions up to 1024x1024.
    # Heights and widths must be divisible by vae_scale_factor * patch_size = 8 * 2 = 16.
    base_resolution: [1024, 1024]
    dynamic_batch_size: false
    shuffle: true
    drop_last: false

checkpoint:
  enabled: true
  checkpoint_dir: PATH_TO_YOUR_CKPT_DIR
  model_save_format: safetensors
  save_consolidated: true
  diffusers_compatible: true
  restore_from: null

wandb:
  project: sd3-finetuning
  mode: online
  name: sd3_5_finetune_run_1

dist_env:
  backend: "nccl"
  init_method: "env://"

seed: 42
